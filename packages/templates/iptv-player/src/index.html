<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPTV Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100vh; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; background: #111; border-bottom: 1px solid #333; }
    header h1 { font-size: 28px; font-weight: 600; }
    #main { display: flex; flex: 1; overflow: hidden; }
    #player-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; min-width: 0; }
    #player { width: 100%; height: 70vh; max-height: 70vh; background: #000; }
    #channel-list { width: 320px; background: #111; border-left: 1px solid #333; overflow-y: auto; padding: 8px 0; }
    .channel-group { padding: 8px 16px 4px; font-size: 18px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .channel-item { display: block; width: 100%; padding: 12px 16px; border: none; background: none; color: #fff; font-size: 24px; text-align: left; cursor: pointer; transition: background 0.15s; }
    .channel-item:hover, .channel-item:focus { background: #333; outline: none; }
    .channel-item.active { background: #2a2a2a; border-left: 4px solid #ffd600; padding-left: 12px; }
    .channel-item:focus { outline: 3px solid #ffd600; outline-offset: -3px; }
    #status-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 24px; background: #111; border-top: 1px solid #333; font-size: 20px; }
    #now-playing { color: #ffd600; font-weight: 500; }
    #status-text { color: #888; }
    .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 28px; color: #888; }
    .error { color: #ff4444; }
    #channel-list::-webkit-scrollbar { width: 8px; }
    #channel-list::-webkit-scrollbar-track { background: #1a1a1a; }
    #channel-list::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>IPTV Player</h1>
      <span id="channel-count"></span>
    </header>
    <div id="main">
      <div id="player-container">
        <video id="player" playsinline controls></video>
        <div id="loading" class="loading" style="display:none;">Loading...</div>
      </div>
      <aside id="channel-list"></aside>
    </div>
    <footer id="status-bar">
      <span id="now-playing">No channel selected</span>
      <span id="status-text">Ready</span>
    </footer>
  </div>
</body>
</html>
