<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ShortVideo TV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: #070707;
      color: #f4f4f4;
      font-family: 'Segoe UI', Arial, sans-serif;
      user-select: none;
    }
    #app {
      min-height: 100%;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .topline {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
    }
    h1 { font-size: 2.1rem; letter-spacing: -0.03em; }
    #status { color: #8d8d8d; font-size: 0.95rem; }

    #setup {
      display: none;
      text-align: center;
      padding: 20px 0;
    }
    #setup-code {
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: 6px;
      color: #e94560;
      margin: 16px 0;
    }
    #setup-qr {
      width: 180px;
      height: 180px;
      margin: 12px auto;
      display: block;
      border-radius: 8px;
    }
    #setup-url {
      font-size: 0.7rem;
      color: #6a6a6a;
      word-break: break-all;
      margin-top: 10px;
    }
    .setup-help {
      color: #6a6a6a;
      font-size: 0.85rem;
      margin-top: 12px;
      line-height: 1.6;
    }

    #feed {
      display: none;
      gap: 2px;
      max-width: 900px;
      overflow-y: auto;
      max-height: 70vh;
    }
    .item {
      padding: 12px 18px;
      border: 2px solid transparent;
      border-radius: 8px;
      background: #141414;
      outline: none;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .item:focus, .item.focused {
      border-color: #e94560;
      background: #1c1c1c;
    }
    .item-idx {
      color: #555;
      font-size: 0.85rem;
      min-width: 28px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-title { font-size: 1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-url { color: #666; font-size: 0.72rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .item-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .badge-tiktok { background: #1a2a2a; color: #25f4ee; }
    .badge-facebook { background: #0d1a3a; color: #1877f2; }
    .badge-bilibili { background: #2a0d1a; color: #fb7299; }
    .badge-direct { background: #1a1a1a; color: #888; }
    #suggestions { margin-top: 12px; }
    .suggest-title { color: #4caf50; font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.03em; }
    .suggest-item {
      padding: 8px 14px;
      border: 1px solid #1a3a1a;
      border-radius: 6px;
      background: #0d1a0d;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
      cursor: pointer;
    }
    .suggest-item:focus { border-color: #4caf50; background: #142a14; }
    .suggest-item-title { flex: 1; font-size: 0.85rem; color: #8a8a8a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .suggest-add-btn {
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid #4caf50;
      background: transparent;
      color: #4caf50;
      font-size: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .suggest-add-btn:hover, .suggest-add-btn:focus { background: #4caf50; color: #fff; }
    #empty { display: none; color: #777; font-size: 1rem; }
    #help { display: none; color: #555; font-size: 0.78rem; margin-top: 8px; text-align: center; letter-spacing: 0.02em; }

    #player {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%;
      z-index: 9999;
      background: #000;
    }
    #player.active { display: block; }
    #video { width: 100%; height: 100%; background: #000; }
    #player-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 16px 22px;
      background: linear-gradient(transparent, rgba(0,0,0,0.82));
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-end;
    }
    #player-title { font-size: 1rem; font-weight: 700; }
    #player-help { color: #aaa; font-size: 0.78rem; white-space: nowrap; }
    #error {
      display: none;
      margin-top: 4px;
      color: #e94560;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main id="app">
    <div class="topline">
      <h1>ShortVideo TV</h1>
      <div id="status">Starting...</div>
    </div>

    <div id="setup">
      <div>Scan QR code with your phone</div>
      <div id="setup-code"></div>
      <img id="setup-qr" src="" alt="QR code" />
      <div id="setup-url"></div>
      <div class="setup-help">
        Open the link on your phone.<br>
        Paste TikTok URLs or direct video links to send to this TV.
      </div>
    </div>

    <div id="feed"></div>
    <div id="suggestions"></div>
    <div id="empty">No playable videos in feed.</div>
    <div id="error"></div>
    <div id="help">← → Select &nbsp; OK: play &nbsp; Red: clear all</div>
  </main>

  <section id="player">
    <video id="video" playsinline></video>
    <div id="player-loading" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#888;font-size:1.1rem;display:none">Loading...</div>
    <div id="player-overlay">
      <div id="player-title"></div>
      <div id="player-help">← → Switch &nbsp; OK: pause &nbsp; Back: feed</div>
    </div>
  </section>

  <script>
    window.onerror = function (message, source, line) {
      var error = document.getElementById('error');
      if (error) {
        error.style.display = 'block';
        error.textContent = 'Startup error: ' + message + ' (line ' + line + ')';
      }
    };
  </script>
  <script src="./dist/inject.js"></script>
</body>
</html>
