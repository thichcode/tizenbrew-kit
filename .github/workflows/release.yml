name: Release and Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm check

      - name: Build
        run: pnpm -r build

      - name: Publish core
        run: pnpm --filter @tizenbrew-kit/core publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish cli
        run: pnpm --filter @tizenbrew-kit/cli publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate changelog notes
        id: notes
        run: |
          echo "## Release ${{ github.ref_name }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Packages" >> RELEASE_NOTES.md
          echo "- @tizenbrew-kit/core" >> RELEASE_NOTES.md
          echo "- @tizenbrew-kit/cli" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### Validation" >> RELEASE_NOTES.md
          echo "- pnpm check" >> RELEASE_NOTES.md
          echo "- pnpm -r build" >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
